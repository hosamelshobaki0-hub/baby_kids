<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرة التعلم الذكي | Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ff7675;
        }

        body { 
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* كرت الدرس الاحترافي */
        .lesson-card {
            background: white;
            border-radius: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 15px 0 #f0f0f0;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        /* شريط التقدم */
        .progress-container {
            position: fixed; top: 30px; width: 80%; max-width: 500px;
            height: 20px; background: rgba(255,255,255,0.3);
            border-radius: 20px; border: 4px solid white; overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--accent);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* العناصر المرئية */
        .visual-box {
            font-size: 9rem;
            margin: 20px 0;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* الأزرار */
        .kid-btn {
            font-size: 1.5rem;
            font-weight: 900;
            padding: 20px;
            border-radius: 30px;
            transition: all 0.2s;
            border-bottom: 8px solid rgba(0,0,0,0.2);
        }
        .kid-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* تأثير النجاح */
        .confetti {
            position: absolute; width: 15px; height: 15px;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="lesson-card" id="main-card">
        <h2 id="group-title" class="text-2xl font-black text-purple-600 mb-2 opacity-70">جاري التحميل...</h2>
        
        <div id="lesson-visual" class="visual-box">🌟</div>
        
        <div id="lesson-content" class="text-3xl font-bold text-slate-800 mb-10 min-h-[100px] flex items-center justify-center">
            هل أنت مستعد للمغامرة؟
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="repeatAudio()" class="kid-btn bg-indigo-500 text-white hover:bg-indigo-600">
                🔊 اسمع
            </button>
            <button id="next-btn" onclick="handleNext()" class="kid-btn bg-emerald-500 text-white hover:bg-emerald-600">
                التالي ⬅️
            </button>
            <button onclick="goBack()" class="kid-btn bg-amber-400 text-white hover:bg-amber-500 col-span-2 mt-2">
                🏠 خروج من الدرس
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonType = urlParams.get('type') || 'colors';

        const groupsDB = {
            'colors': {
                title: 'مغامرة الألوان 🎨',
                steps: [
                    { v: '🔴', t: 'هذا هو اللون الأحمر، مثل التفاحة الشهية' },
                    { v: '🔵', t: 'وهذا هو اللون الأزرق، مثل السماء الصافية' },
                    { v: '🟢', t: 'وهذا هو اللون الأخضر، مثل أوراق الشجر' },
                    { v: '🟡', t: 'وهذا هو اللون الأصفر، مثل قرص الشمس' },
                    { v: '🟠', t: 'وهذا هو اللون البرتقالي، لون البرتقال اللذيذ' },
                    { v: '🟣', t: 'وهذا هو اللون البنفسجي، لون الزهور الجميلة' },
                    { v: '🟤', t: 'وهذا هو اللون البني، مثل جذع الشجرة' },
                    { v: '⚫', t: 'وهذا هو اللون الأسود، مثل ريش الغراب' },
                    { v: '⚪', t: 'وهذا هو اللون الأبيض، مثل الثلج البارد' },
                    { v: '💗', t: 'وهذا هو اللون الوردي، لون الفراشات اللطيفة' }
                ]
            },
            'numbers': {
                title: 'مغامرة الأرقام 🔢',
                steps: [
                    { v: '1️⃣', t: 'واحد.. قمر واحد في السماء' },
                    { v: '2️⃣', t: 'اثنان.. عينان جميلتان نرى بهما' },
                    { v: '3️⃣', t: 'ثلاثة.. ثلاثة ألوان في إشارة المرور' },
                    { v: '4️⃣', t: 'أربعة.. أربعة أرجل للكرسي' },
                    { v: '5️⃣', t: 'خمسة.. خمسة أصابع في يدي الواحدة' },
                    { v: '6️⃣', t: 'ستة.. ست أرجل للنحلة النشيطة' },
                    { v: '7️⃣', t: 'سبعة.. سبعة أيام في الأسبوع' },
                    { v: '8️⃣', t: 'ثمانية.. ثمانية أرجل للأخطبوط' },
                    { v: '9️⃣', t: 'تسعة.. تسع كواكب تدور حول الشمس' },
                    { v: '🔟', t: 'عشرة.. برافو! لقد وصلت للرقم عشرة' }
                ]
            }
        };

        let currentStep = 0;
        const groupData = groupsDB[lessonType] || groupsDB['colors'];

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function updateUI() {
            const step = groupData.steps[currentStep];
            const visual = document.getElementById('lesson-visual');
            const content = document.getElementById('lesson-content');
            const bar = document.getElementById('progress-bar');

            // تأثير الانتقال
            visual.style.transform = "scale(0) rotate(-180deg)";
            setTimeout(() => {
                visual.innerText = step.v;
                content.innerText = step.t;
                visual.style.transform = "scale(1) rotate(0deg)";
                speak(step.t);
            }, 300);

            // تحديث شريط التقدم
            bar.style.width = ((currentStep + 1) / groupData.steps.length) * 100 + "%";

            if (currentStep === groupData.steps.length - 1) {
                document.getElementById('next-btn').innerText = "تمت المهمة 🏆";
            }
        }

        function handleNext() {
            if (currentStep < groupData.steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                finishLesson();
            }
        }

        function repeatAudio() {
            speak(groupData.steps[currentStep].t);
        }

        function finishLesson() {
            // إضافة نجوم للملف الشخصي
            let data = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
            data.stars += 15;
            localStorage.setItem('gameProgress', JSON.stringify(data));

            createConfetti();
            
            document.getElementById('main-card').innerHTML = `
                <div class="scale-up">
                    <div class="text-[120px] mb-4">🏆</div>
                    <h2 class="text-4xl font-black text-emerald-600 mb-4">أنت بطلٌ مذهل!</h2>
                    <p class="text-xl text-slate-600 mb-8">لقد أنهيت الدرس بنجاح وحصلت على 15 نجمة ⭐</p>
                    <button onclick="goBack()" class="kid-btn bg-indigo-600 text-white w-full">العودة للوحة المغامرات</button>
                </div>
            `;
            speak("أحسنت يا بطل! لقد أنهيت الدرس بنجاح ومبارك لك النجوم الجديدة");
        }

        function createConfetti() {
            for(let i=0; i<50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function goBack() { window.location.href = 'child-dashboard.html'; }

        window.onload = () => {
            document.getElementById('group-title').innerText = groupData.title;
            updateUI();
        };
    </script>
</body>
</html>
