<header class="universal-header">
  <div class="max-w-6xl mx-auto p-4 flex justify-between items-center">
    <a href="map.html" class="logo text-2xl font-bold">🗺️ تعليمي</a>
    <div class="stars-section flex gap-4 items-center">
      <span class="stars-icon text-2xl">⭐</span>
      <span id="live-stars-nav" class="text-xl font-bold bg-white/20 px-4 py-2 rounded-xl backdrop-blur">0</span>
      <a href="achievements.html" class="text-xl font-bold bg-white/20 px-4 py-2 rounded-xl backdrop-blur">🏆</a>
    </div>
  </div>
</header>

<script>
(function() {
  const appData = JSON.parse(localStorage.getItem('kidsApp') || '{"stars":0}');
  document.getElementById('live-stars-nav').textContent = appData.stars;
  
  window.winStar = function(pageName) {
    appData.stars += 1;
    localStorage.setItem('kidsApp', JSON.stringify(appData));
    document.getElementById('live-stars-nav').textContent = appData.stars;
  };
})();
</script>
