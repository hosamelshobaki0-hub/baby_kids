
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل جديد | Kids Learning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh; 
    }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
    input { 
      width: 100%; padding: 20px; margin: 15px 0; 
      border: 4px solid #ddd; border-radius: 30px; 
      font-size: 20px; text-align: center; font-family: inherit;
    }
    .kid-btn { 
      background: linear-gradient(45deg, #ff9a9e, #fecfef);
      border: none; border-radius: 50px; padding: 20px 50px; 
      font-size: 24px; font-weight: bold; color: white; cursor: pointer; 
      min-height: 80px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 0.3s; font-family: inherit;
    }
    .kid-btn:hover { transform: scale(1.05); }
    .kid-card { 
      background: rgba(255,255,255,0.95); border-radius: 40px; 
      padding: 40px; margin: 50px 0; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    @media (max-width: 768px) { .kid-btn { font-size: 20px; padding: 15px 30px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="text-center mb-12">
      <h1 style="font-size: 4rem; margin-bottom: 20px; color: #333;">👨‍👩‍👧 إنشاء حساب</h1>
      <p style="font-size: 1.5rem; color: #666;">سجل وأنشئ ملف طفلك</p>
    </div>
    <div class="kid-card">
      <input id="parent-name" placeholder="👤 اسم الأب/الأم">
      <input id="parent-email" type="email" placeholder="📧 البريد الإلكتروني">
      <input id="child-name" placeholder="👶 اسم الطفل">
      <input id="child-age" type="number" min="1" max="6" placeholder="🎂 عمر الطفل">
      <button class="kid-btn" onclick="registerUser()">إنشاء الحساب ⭐</button>
      <div style="margin-top: 30px; text-align: center;">
        <a href="login.html" style="color: #666; font-size: 18px; text-decoration: none;">← لدي حساب بالفعل</a>
      </div>
    </div>
  </div>

  <script>
    function registerUser() {
      var data = {
        parentName: document.getElementById('parent-name').value,
        parentEmail: document.getElementById('parent-email').value,
        childName: document.getElementById('child-name').value,
        childAge: document.getElementById('child-age').value
      };
      
      if (data.childName && data.childAge && data.parentEmail) {
        localStorage.setItem('kidsUser', JSON.stringify(data));
        alert('تم إنشاء الحساب بنجاح! 🎉');
        window.location.href = 'child-dashboard.html';
      } else {
        alert('يرجى ملء كل البيانات');
      }
    }
  </script>
</body>
</html>
