<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأرنب المرح 🐰 | طرائف وحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #fff9db;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bunny-container {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .bunny-container:hover { transform: scale(1.05); }
        .bunny-container:active { transform: scale(0.95); }

        /* فقاعة الكلام */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 0 #fab1a0;
            border: 4px solid #ff7675;
            max-width: 350px;
            text-align: center;
            font-weight: 900;
            color: #d63031;
            font-size: 1.3rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            border-width: 20px 20px 0;
            border-style: solid;
            border-color: #ff7675 transparent;
            display: block;
            width: 0;
            margin-left: -20px;
        }

        .btn-joke {
            background: #55efc4;
            border-bottom: 6px solid #00b894;
            transition: 0.1s;
        }
        .btn-joke:active { transform: translateY(4px); border-bottom-width: 0; }

        .btn-proverb {
            background: #74b9ff;
            border-bottom: 6px solid #0984e3;
        }
        .btn-proverb:active { transform: translateY(4px); border-bottom-width: 0; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-custom { animation: bounce 1s infinite; }
    </style>
</head>
<body class="p-6">

    <nav class="w-full max-w-2xl flex justify-between items-center mb-8">
        <a href="child-dashboard.html" class="bg-white px-6 py-2 rounded-2xl shadow-md font-bold text-orange-500 hover:bg-orange-50 transition">🏠 العودة</a>
        <div class="bg-white px-6 py-2 rounded-2xl shadow-md font-black text-orange-500">🐰 الأرنب الفصيح</div>
    </nav>

    <div class="speech-bubble" id="joke-display">
        أهلاً بك يا بطل! أنا صديقك الأرنب.. اضغط عليّ أو اختر من الأزرار بالأسفل!
    </div>

    <div class="bunny-container mb-10" onclick="saySomethingRandom()">
        <div class="text-[12rem] drop-shadow-2xl animate-bounce-custom">🐰</div>
    </div>

    <div class="grid grid-cols-1 gap-4 w-full max-w-xs">
        <button onclick="getJoke()" class="btn-joke text-white py-4 rounded-3xl text-xl font-black shadow-lg">
            أخبرني طرفة 😂
        </button>
        <button onclick="getProverb()" class="btn-proverb text-white py-4 rounded-3xl text-xl font-black shadow-lg">
            أعطني حكمة اليوم 🧐
        </button>
    </div>

    <script>
        const jokes = [
            "سأل رجل أرنباً: لماذا أذناك طويلتان؟ قال الأرنب: لكي أسمعك بوضوح يا ثقيل الظل!",
            "نظرت نملة إلى المرآة وقالت: يا له من خصر نحيل، كم أنا رشيقة!",
            "لماذا يسير القطار خلف السائق؟ لأن السائق ينظر إلى الأمام دائماً!",
            "طبيب أسنان تزوّج طبيبة أسنان، رزقهما الله بطفل سمّياه 'سوسة'!",
            "معلم رياضيات رزق بولدين وبنت، أطلق على الولدين اسم (طرفين) وعلى البنت اسم (وسطين)!"
        ];

        const proverbs = [
            "من يملك أرنباً لا يخشى الجوع أبداً!",
            "العين لا تكون عيناً إلا إذا أبصرت الحقيقة يا بطل!",
            "أكل السبانخ يمنحك القوة، لكن الجزر يجعل عينيك مثل الصقر!",
            "من يتعب اليوم في التعلم، يرتاح غداً ويجمع نجوماً كثيرة!",
            "الوقت من ذهب، فاستغله في اللعب المفيد والتعلم!"
        ];

        const greetings = [
            "أنت بطل رائع وذكي جداً!",
            "ما أجمل هذه الابتسامة يا صديقي!",
            "لقد اشتقت إليك كثيراً!",
            "أنت تزداد ذكاءً وجمالاً في كل يوم!"
        ];

        function speakFusha(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA'; // نطق باللغة العربية الفصحى
            msg.rate = 0.85;    // سرعة متزنة للوضوح
            msg.pitch = 1.3;    // صوت كرتوني محبب للأطفال
            window.speechSynthesis.speak(msg);
        }

        function displayAndSpeak(text) {
            document.getElementById('joke-display').innerText = text;
            speakFusha(text);
        }

        function getJoke() {
            const joke = jokes[Math.floor(Math.random() * jokes.length)];
            displayAndSpeak(joke);
        }

        function getProverb() {
            const proverb = proverbs[Math.floor(Math.random() * proverbs.length)];
            displayAndSpeak(proverb);
        }

        function saySomethingRandom() {
            const greet = greetings[Math.floor(Math.random() * greetings.length)];
            displayAndSpeak(greet);
        }

        window.onload = () => {
            setTimeout(() => {
                speakFusha("أهلاً بك يا بطل في صفحتي.. أنا الأرنب الفصيح، هل تحب أن أخبرك طرفة أم حكمة؟");
            }, 500);
        };
    </script>
</body>
</html>
