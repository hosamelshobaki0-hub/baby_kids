<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرقعة البالونات 🎈 | عالم الألعاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fdcb6e;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            margin: 0;
            overflow: hidden; /* لمنع التمرير أثناء اللعب */
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            min-height: 100vh;
        }

        /* تنسيق الهيدر */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 100;
        }

        .nav-btn {
            background: #ff7675;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
        }

        /* منطقة اللعب */
        #balloons-container {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: auto;
        }

        /* تصميم البالونة المطور */
        .balloon {
            width: 80px;
            height: 100px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            bottom: -120px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset -10px -10px 15px rgba(0,0,0,0.1);
            animation: float-up linear forwards;
        }

        /* خيط البالونة */
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -20px;
            width: 2px;
            height: 25px;
            background: rgba(0,0,0,0.2);
        }

        .balloon-letter {
            font-size: 2.5rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            pointer-events: none;
            user-select: none;
        }

        /* لوحة المعلومات */
        .ui-panel {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }

        .target-box {
            background: white;
            padding: 20px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid var(--primary);
        }

        .btn-start {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #4834d4;
            pointer-events: auto;
        }

        .hidden { display: none !important; }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(20deg); }
        }

        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <nav class="top-bar">
        <div style="font-size: 1.5rem; font-weight: 900; color: var(--primary);">🎈 فرقعة الحروف</div>
        <div style="font-size: 1.2rem;">⭐ نجومك: <span id="current-stars">0</span></div>
        <a href="games.html" class="nav-btn">خروج</a>
    </nav>

    <div id="balloons-container"></div>

    <div class="ui-panel">
        <div id="start-screen" class="target-box">
            <h1>جاهز للصيد؟</h1>
            <p>فرقع البالونات اللي عليها الحرف المطلوب فقط!</p>
            <button onclick="startGame()" class="btn-start">ابدأ الآن 🎮</button>
        </div>

        <div id="game-stats" class="target-box hidden">
            <div style="font-size: 1rem; color: #666;">فرقع حرف:</div>
            <div id="target-letter" style="font-size: 5rem; font-weight: 900; color: var(--primary);">أ</div>
            <div style="display: flex; gap: 20px; justify-content: center; margin-top: 10px;">
                <div>🎈: <span id="popped-count">0</span></div>
                <div>⏱️: <span id="timer">60</span></div>
            </div>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <h2 style="font-size: 2rem;">انتهى الوقت! 🥳</h2>
        <div id="final-score" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <button onclick="addStarsAndReturn()" class="btn-start">جمع النجوم ⭐</button>
    </div>

    <script>
        let gameActive = false;
        let popped = 0;
        let timeLeft = 60;
        let targetLetter = '';
        let difficultyLevel = 1; // 1: normal, higher means faster/more frequent
        let spawnInterval;
        const letters = 'ابتثجحخدذرزسشصضطظعغفقكلمنهوي';
        const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fd79a8'];

        // تحديث النجوم من الذاكرة
        function updateStarsDisplay() {
            const progress = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
            document.getElementById('current-stars').textContent = progress.stars;
        }
        updateStarsDisplay();

        function startGame() {
            gameActive = true;
            popped = 0;
            timeLeft = 60;
            difficultyLevel = 1; // Reset difficulty for new game
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('balloons-container').innerHTML = '';
            
            setNewTarget();
            gameLoop(); l = setInterval(createOneBalloon, 800);
        }

        function setNewTarget() {
            targetLetter = letters[Math.floor(Math.random() * letters.length)];
            document.getElementById('target-letter').textContent = targetLetter;
            document.getElementById('popped-count').textContent = popped;
        }

        function createOneBalloon() {
            if (!gameActive) return;
            const container = document.getElementById('balloons-container');
            const balloon = document.createElement('div');
            const letter = letters[Math.floor(Math.random() * letters.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            balloon.className = 'balloon';
            balloon.style.left = `${Math.random() * 85 + 5}%`;
            balloon.style.backgroundColor = color;
            // سرعة البالونات تعتمد على مستوى الصعوبة
        ahdfcultyLevel * 0.5) + Math.random() * 2); // Min duration 3s
            balloon.style.animationDuration = `${duration}s`;
            
            balloon.innerHTML = `<div class="balloon-letter">${letter}</div>`;
            
            balloon.onclick = (e) => popBalloon(e, letter);
            
            container.appendChild(balloon);
            
            // حذف البالونة بعد خروجها من الشاشة لتوفير الذاكرة
            setTimeout(() => { if(balloon.parentNode) balloon.remove(); }, duration * 1000);
        }

        function popBalloon(event, letter) {
            if (!gameActive) return;
            const balloon = event.currentTarget;

            if (letter === targetLetter) {
                popped++;
                document.getElementById('popped-count').textContent = popped;
                playPopSound(true);
                
                // تأثير الفرقعة
                balloon.style.transform = 'scale(1.5)';
                balloon.style.opacity = '0';
                setTimeout(() => balloon.remove(), 200);

                // كل 5 بالونات نغير الحرف المطلوب لزيادة الحماس
                if (popped % 5 === 0) {
                    setNewTarget();
                    increaseDifficulty(); // Increase difficulty
            } else {
                playPopSound(false);
                balloon.style.animationPlayState = 'paused';
                balloon.style.backgroundColor = '#ccc';
                setTimeout(() => { if(balloon.parentNode) balloon.remove(); }, 200);
            }
        }

        function increaseDifficulty() {
            difficultyLevel++;
            clearInterval(spawnInterval); // Clear old interval
            // Increase spawn frequency (shorter interval)
            const newSpawnInterval = Math.max(300, 800 - (difficultyLevel * 50)); // Min interval 300ms
            spawnInterval = setInterval(createOneBalloon, newSpawnInterval);
            console.log(`Difficulty increased to ${difficultyLevel}. New spawn interval: ${newSpawnInterval}ms`);
        }

        function gameLoop() {
            if (!gameActive) return;
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 0) endGame();
            else setTimeout(gameLoop, 1000);
            // No need to call createOneBalloon here, it's handled by spawnInterval
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score').textContent = `جمعت ${popped} بالونة حرف "${targetLetter}"!`;
        }

        function addStarsAndReturn() {
            const progress = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
            progress.stars += popped * 2; // نجمتين لكل بالونة
            localStorage.setItem('gameProgress', JSON.stringify(progress));
            location.href = 'games.html';
        }

        function playPopSound(isCorrect) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = isCorrect ? 'sine' : 'square';
            osc.frequency.setValueAtTime(isCorrect ? 600 : 150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.2);

            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
    </script>
</body>
</html>
