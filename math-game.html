<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبقري الأرقام | Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --math-bg: #55efc4;
            --accent-color: #00b894;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Cairo', sans-serif;
            background: var(--math-bg);
            background-image: linear-gradient(rgba(255,255,255,0.2) 2px, transparent 2px), 
                              linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .header {
            width: 100%; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center;
            background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .score-badge {
            background: #ffeaa7; padding: 10px 20px; border-radius: 20px;
            font-weight: 900; color: #d35400; border: 3px solid #fdcb6e;
        }

        .problem-card {
            background: white; margin-top: 50px; padding: 40px;
            border-radius: 40px; box-shadow: 0 20px 0 rgba(0,0,0,0.1);
            text-align: center; width: 90%; max-width: 500px;
            border: 8px solid #fab1a0;
        }

        .equation {
            font-size: 5rem; color: #2d3436; margin-bottom: 20px;
            letter-spacing: 10px; direction: ltr; /* لضمان ظهور العملية الحسابية بشكل صحيح */
        }

        .options-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; margin-top: 30px; width: 100%;
        }

        .num-btn {
            background: #74b9ff; color: white; border: none;
            padding: 20px; border-radius: 25px; font-size: 3rem;
            font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 0 #0984e3; transition: 0.2s;
            font-family: inherit;
        }

        .num-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #0984e3; }
        .num-btn:nth-child(even) { background: #a29bfe; box-shadow: 0 8px 0 #6c5ce7; }

        .back-home {
            margin-top: 40px; background: #ff7675; color: white;
            border: none; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        /* أنميشن النجاح */
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); rotate: 10deg; }
            100% { transform: scale(1); }
        }
        .correct { animation: celebrate 0.5s ease; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-badge">نجومك: <span id="stars-count">0</span> ⭐</div>
        <h2 style="color: var(--accent-color)">تحدي العباقرة 🧠</h2>
    </div>

    <div class="problem-card" id="game-box">
        <p style="font-size: 1.5rem; color: #636e72;">كم يساوي المجموع؟</p>
        <div class="equation" id="equation-text">2 + 3</div>
        
        <div class="options-grid" id="options-grid">
            </div>
    </div>

    <button class="back-home" onclick="location.href='games.html'">🔙 عودة للألعاب</button>

    <script>
        let stars = 0;
        let correctAnswer = 0;
        let gameProgress = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}');

        function init() {
            stars = gameProgress.stars;
            document.getElementById('stars-count').innerText = stars;
            generateProblem();
        }

        function generateProblem() {
            // توليد رقمين عشوائيين بين 1 و 5 لتسهيل الحساب للأطفال
            const n1 = Math.floor(Math.random() * 5) + 1;
            const n2 = Math.floor(Math.random() * 5) + 1;
            correctAnswer = n1 + n2;

            document.getElementById('equation-text').innerText = `${n1} + ${n2}`;

            // توليد خيارات
            let options = [correctAnswer];
            while(options.length < 4) {
                let wrong = Math.floor(Math.random() * 10) + 1;
                if(!options.includes(wrong)) options.push(wrong);
            }
            
            // خلط الخيارات
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = opt;
                btn.onclick = () => checkResult(opt, btn);
                grid.appendChild(btn);
            });
        }

        function checkResult(selected, btn) {
            if(selected === correctAnswer) {
                // نجاح
                stars += 2; // لعب الأرقام يعطي نجوم أكثر
                gameProgress.stars = stars;
                localStorage.setItem('gameProgress', JSON.stringify(gameProgress));
                document.getElementById('stars-count').innerText = stars;
                
                btn.style.background = "#55efc4";
                speak("أحسنت! إجابة صحيحة");
                
                setTimeout(() => {
                    generateProblem();
                }, 1000);
            } else {
                // خطأ
                btn.style.background = "#ff7675";
                btn.style.textDecoration = "line-through";
                speak("حاول مرة أخرى");
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            speechSynthesis.speak(msg);
        }

        window.onload = init;
    </script>
</body>
</html>
