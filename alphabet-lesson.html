<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم الحروف العربية 📖</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-color);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .letter-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 6px solid rgba(0,0,0,0.1);
        }
        .letter-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .btn-action {
            background: #4ade80;
            border-bottom: 6px solid #16a34a;
            transition: 0.2s;
        }
        .btn-action:active {
            border-bottom-width: 0;
            transform: translateY(6px);
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-10 bg-white p-4 rounded-3xl shadow-sm border-b-4 border-slate-100">
        <div class="text-2xl font-black text-emerald-600 flex items-center gap-2">
            <span>📚</span> درس الحروف العربية
        </div>
        <div class="flex gap-3">
            <a href="child-dashboard.html" class="bg-slate-100 px-4 py-2 rounded-2xl hover:bg-slate-200 transition font-bold text-slate-600">🏠 الرئيسية</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto bg-white rounded-[40px] p-8 shadow-xl">
        <h1 class="text-3xl font-black text-center mb-10 text-slate-800">انقر على الحرف لتسمع نُطقه الصحيح 🗣️</h1>
        
        <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-6" id="letters-container">
            </div>
        
        <div class="mt-16 text-center">
            <button onclick="startLetterQuiz()" class="btn-action text-white px-12 py-5 rounded-3xl text-2xl font-black shadow-lg">
                يلا نلعب اختبار الحروف 🎯
            </button>
        </div>
    </div>

    <script>
        // مصفوفة الحروف بالأسماء الفصحى الصحيحة
        const letters = [
            { char: 'أ', name: 'أَلِف', color: '#f472b6' },
            { char: 'ب', name: 'بَاء', color: '#60a5fa' },
            { char: 'ت', name: 'تَاء', color: '#818cf8' },
            { char: 'ث', name: 'ثَاء', color: '#fb7185' },
            { char: 'ج', name: 'جِيم', color: '#34d399' },
            { char: 'ح', name: 'حَاء', color: '#fbbf24' },
            { char: 'خ', name: 'خَاء', color: '#fb923c' },
            { char: 'د', name: 'دَال', color: '#22d3ee' },
            { char: 'ذ', name: 'ذَال', color: '#a78bfa' },
            { char: 'ر', name: 'رَاء', color: '#f87171' },
            { char: 'ز', name: 'زَاي', color: '#4ade80' },
            { char: 'س', name: 'سِين', color: '#38bdf8' },
            { char: 'ش', name: 'شِين', color: '#818cf8' },
            { char: 'ص', name: 'صَاد', color: '#94a3b8' }
        ];

        const container = document.getElementById('letters-container');

        // دالة النطق باللغة العربية الفصحى
        function speakFusha(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA'; // نطق لغة عربية فصحى (السعودية)
            utterance.rate = 0.7;     // سرعة بطيئة للتعلم
            utterance.pitch = 1.0;    
            speechSynthesis.speak(utterance);
        }

        // دالة مخصصة للتشجيع بالعامية (للحفاظ على الألفة)
        function speakEncouragement(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-EG'; 
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        // بناء كروت الحروف
        letters.forEach(l => {
            const div = document.createElement('div');
            div.className = "letter-card p-6 rounded-3xl cursor-pointer text-white text-center";
            div.style.background = l.color;
            div.innerHTML = `
                <div class="text-6xl font-black mb-2">${l.char}</div>
                <div class="font-bold text-xl opacity-90">${l.name}</div>
            `;
            div.onclick = () => {
                speakFusha(l.name);
            };
            container.appendChild(div);
        });

        function startLetterQuiz() {
            speakEncouragement("مستعد للاختبار يا بطل؟ يلا بينا نشوف شطارتك!");
            setTimeout(() => {
                alert('استعد لاختبار الحروف! 📝');
            }, 1000);
        }

        // ترحيب عند الفتح
        window.onload = () => {
            setTimeout(() => {
                speakEncouragement("أهلاً بك يا بطل.. اضغط على الحروف لكي تتعلم نطقها الصحيح");
            }, 500);
        };
    </script>
</body>
</html>
