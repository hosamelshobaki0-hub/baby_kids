<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رعاية أرنوب 🐰 | حديقة الحيوان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #e0f7fa; /* لون سماوي هادئ */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bunny-sprite {
            font-size: 10rem;
            transition: all 0.5s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        .status-bar {
            width: 100%;
            height: 15px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #fff;
        }
        .progress {
            height: 100%;
            width: 100%;
            transition: width 0.5s ease;
        }
        .action-btn {
            transition: all 0.2s;
            border-bottom: 5px solid rgba(0,0,0,0.2);
        }
        .action-btn:active {
            transform: translateY(4px);
            border-bottom-width: 0;
        }
        @keyframes heart-pop {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
        }
        .heart {
            position: absolute;
            animation: heart-pop 1s forwards;
            font-size: 2rem;
        }
    </style>
</head>
<body class="p-6">

    <nav class="w-full max-w-2xl flex justify-between items-center mb-6">
        <a href="child-dashboard.html" class="bg-white px-5 py-2 rounded-2xl shadow font-bold text-cyan-600">🏠 العودة</a>
        <div class="bg-white px-5 py-2 rounded-2xl shadow font-black text-amber-500">⭐ <span id="star-count">0</span></div>
    </nav>

    <div class="grid grid-cols-3 gap-4 w-full max-w-md mb-8 bg-white p-4 rounded-[30px] shadow-lg border-4 border-white">
        <div>
            <div class="text-center mb-1">🥕 الجوع</div>
            <div class="status-bar"><div id="hunger-bar" class="progress bg-orange-400"></div></div>
        </div>
        <div>
            <div class="text-center mb-1">💧 العطش</div>
            <div class="status-bar"><div id="thirst-bar" class="progress bg-blue-400"></div></div>
        </div>
        <div>
            <div class="text-center mb-1">🧼 النظافة</div>
            <div class="status-bar"><div id="clean-bar" class="progress bg-green-400"></div></div>
        </div>
    </div>

    <div class="relative flex flex-col items-center justify-center mb-10 h-64 w-64 bg-white/50 rounded-full border-8 border-white/30" id="bunny-area">
        <div id="bunny" class="bunny-sprite">🐰</div>
        <div id="hearts-container"></div>
    </div>

    <div class="bg-white px-8 py-4 rounded-3xl shadow-xl mb-10 border-4 border-cyan-200 text-center font-bold text-cyan-800 text-xl" id="bunny-msg">
        أهلاً بك! أنا جائع قليلاً.. هل تطعمني؟
    </div>

    <div class="grid grid-cols-3 gap-6 w-full max-w-md">
        <button onclick="care('feed')" class="action-btn bg-orange-100 p-4 rounded-[30px] flex flex-col items-center shadow-lg border-2 border-orange-200">
            <span class="text-4xl mb-2">🥕</span>
            <span class="font-black text-orange-600">إطعام</span>
        </button>
        <button onclick="care('drink')" class="action-btn bg-blue-100 p-4 rounded-[30px] flex flex-col items-center shadow-lg border-2 border-blue-200">
            <span class="text-4xl mb-2">💧</span>
            <span class="font-black text-blue-600">سقاية</span>
        </button>
        <button onclick="care('clean')" class="action-btn bg-green-100 p-4 rounded-[30px] flex flex-col items-center shadow-lg border-2 border-green-200">
            <span class="text-4xl mb-2">🧼</span>
            <span class="font-black text-green-600">تحميم</span>
        </button>
    </div>

    <script>
        let stats = { hunger: 50, thirst: 50, clean: 50 };
        let stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}').stars;

        function updateUI() {
            document.getElementById('hunger-bar').style.width = stats.hunger + '%';
            document.getElementById('thirst-bar').style.width = stats.thirst + '%';
            document.getElementById('clean-bar').style.width = stats.clean + '%';
            document.getElementById('star-count').innerText = stars;
            
            // تغيير شكل الأرنب بناءً على الحالة
            const bunny = document.getElementById('bunny');
            if(stats.hunger < 20 || stats.thirst < 20) bunny.innerText = '🥺';
            else if(stats.clean < 20) bunny.innerText = '🤢';
            else if(stats.hunger > 80 && stats.thirst > 80) bunny.innerText = '😊';
            else bunny.innerText = '🐰';
        }

        function speakFusha(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.pitch = 1.4;
            window.speechSynthesis.speak(msg);
        }

        function care(type) {
            if (type === 'feed' && stats.hunger < 100) {
                stats.hunger = Math.min(100, stats.hunger + 20);
                showHeart('🧡');
                speakFusha("هذا الجزر لذيذ جداً! شكراً لك");
                checkStars();
            } else if (type === 'drink' && stats.thirst < 100) {
                stats.thirst = Math.min(100, stats.thirst + 20);
                showHeart('💧');
                speakFusha("لقد كنت عطشاً جداً.. الماء منعش");
                checkStars();
            } else if (type === 'clean' && stats.clean < 100) {
                stats.clean = Math.min(100, stats.clean + 20);
                showHeart('✨');
                speakFusha("أنا الآن نظيف وأشعر بالنشاط");
                checkStars();
            }
            updateUI();
        }

        function showHeart(emoji) {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = emoji;
            h.style.left = Math.random() * 80 + 10 + '%';
            h.style.top = '20%';
            document.getElementById('hearts-container').appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        function checkStars() {
            if(stats.hunger + stats.thirst + stats.clean >= 280) {
                stars += 1;
                localStorage.setItem('gameProgress', JSON.stringify({stars: stars}));
                document.getElementById('star-count').innerText = stars;
            }
        }

        // نقص الحالة تدريجياً لمحاكاة الواقع
        setInterval(() => {
            stats.hunger = Math.max(0, stats.hunger - 2);
            stats.thirst = Math.max(0, stats.thirst - 3);
            stats.clean = Math.max(0, stats.clean - 1);
            updateUI();
        }, 5000);

        window.onload = () => {
            updateUI();
            setTimeout(() => speakFusha("أهلاً بك يا صديقي.. هل يمكنك الاعتناء بي اليوم؟"), 500);
        };
    </script>
</body>
</html>
