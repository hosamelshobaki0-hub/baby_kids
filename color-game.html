<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الألوان السريع | Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-font: 'Cairo', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--primary-font);
            background: #2c3e50;
            min-height: 100vh; color: white;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .game-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .header-info {
            display: flex; justify-content: space-between; padding: 20px 30px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }

        .stat-box {
            background: white; color: #333; padding: 10px 20px;
            border-radius: 20px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 4px 0 #bdc3c7;
        }

        .game-area {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: calc(100vh - 100px);
            padding: 20px;
        }

        .instruction {
            font-size: 2rem; margin-bottom: 20px; text-shadow: 2px 2px 0px #000;
        }

        #target-text {
            font-size: 3.5rem; font-weight: 900; margin-bottom: 20px;
            padding: 10px 40px; border-radius: 50px; background: white;
            color: #333; box-shadow: 0 10px 0 rgba(0,0,0,0.2);
            animation: pulse 1s infinite alternate;
        }

        .color-options {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 25px; margin-top: 30px;
        }

        .color-circle {
            width: 140px; height: 140px; border-radius: 50%;
            border: 8px solid white; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem;
        }

        .color-circle:hover { transform: scale(1.1) rotate(5deg); }
        .color-circle:active { transform: scale(0.9); }

        .back-btn {
            position: fixed; bottom: 20px; left: 20px;
            background: #e74c3c; color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-family: inherit;
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #c0392b;
        }

        @keyframes pulse {
            from { transform: scale(1); } to { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        .wrong-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="game-overlay"></div>

    <div class="header-info">
        <div class="stat-box">⭐ النجوم: <span id="stars-count">0</span></div>
        <div class="stat-box">🎯 النقاط: <span id="score-count">0</span></div>
    </div>

    <div class="game-area">
        <div class="instruction">أين هو اللون...</div>
        <div id="target-text">أحمر</div>

        <div class="color-options" id="options-grid">
            </div>
    </div>

    <button class="back-btn" onclick="location.href='games.html'">🏠 إنهاء اللعب</button>

    <script>
        const colors = [
            { name: 'أحمر', hex: '#ff4757', emoji: '🍎' },
            { name: 'أزرق', hex: '#2e86de', emoji: '🐳' },
            { name: 'أخضر', hex: '#2ed573', emoji: '🌳' },
            { name: 'أصفر', hex: '#ffa502', emoji: '☀️' },
            { name: 'برتقالي', hex: '#ff7f50', emoji: '🍊' },
            { name: 'بنفسجي', hex: '#a29bfe', emoji: '🍇' }
        ];

        let score = 0;
        let stars = 0;
        let currentTarget = null;
        let gameProgress = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}');

        function initGame() {
            stars = gameProgress.stars;
            document.getElementById('stars-count').innerText = stars;
            nextRound();
        }

        function nextRound() {
            // اختيار لون عشوائي ليكون الهدف
            currentTarget = colors[Math.floor(Math.random() * colors.length)];
            const targetDisplay = document.getElementById('target-text');
            targetDisplay.innerText = currentTarget.name;
            targetDisplay.style.color = currentTarget.hex;

            // نطق اسم اللون
            speak(currentTarget.name);

            // إنشاء الخيارات (خلط الألوان)
            const shuffled = [...colors].sort(() => 0.5 - Math.random()).slice(0, 4);
            if (!shuffled.find(c => c.name === currentTarget.name)) {
                shuffled[0] = currentTarget;
                shuffled.sort(() => 0.5 - Math.random());
            }

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            shuffled.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color-circle';
                div.style.backgroundColor = color.hex;
                div.innerHTML = color.emoji;
                div.onclick = () => checkAnswer(color, div);
                grid.appendChild(div);
            });
        }

        function checkAnswer(selected, element) {
            if (selected.name === currentTarget.name) {
                // إجابة صحيحة
                score += 10;
                stars += 1;
                document.getElementById('score-count').innerText = score;
                document.getElementById('stars-count').innerText = stars;
                
                // تحديث الـ Storage
                gameProgress.stars = stars;
                localStorage.setItem('gameProgress', JSON.stringify(gameProgress));

                // تأثيرات النجاح
                document.body.style.backgroundColor = selected.hex;
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });

                setTimeout(() => {
                    document.body.style.backgroundColor = '#2c3e50';
                    nextRound();
                }, 1000);
            } else {
                // إجابة خاطئة
                element.classList.add('wrong-shake');
                setTimeout(() => element.classList.remove('wrong-shake'), 400);
                speak("حاول مرة أخرى");
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        window.onload = initGame;
    </script>
</body>
</html>
