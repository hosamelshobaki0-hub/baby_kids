<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>درس الأرقام | تعليمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="age-kid">
  <nav class="header">
    <div class="logo">🔢 درس الأرقام</div>
    <div>
      <a href="child-dashboard.html" class="nav-btn">🏠 الرئيسية</a>
      <a href="games.html" class="nav-btn">⭐ ألعاب</a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-8">
    <div class="card mb-8">
      <h1 class="text-4xl font-bold text-center mb-8">الأرقام من 1 إلى 10 🔢</h1>
      
      <div class="grid grid-cols-5 gap-6 mb-12">
        <div class="number-card p-8 rounded-3xl text-center cursor-pointer hover:scale-110 transition-all text-3xl font-bold" onclick="playNumber(1)" style="background: #ff6b6b">
          ١
        </div>
        <div class="number-card p-8 rounded-3xl text-center cursor-pointer hover:scale-110 transition-all text-3xl font-bold" onclick="playNumber(2)" style="background: #4ecdc4">
          ٢
        </div>
        <div class="number-card p-8 rounded-3xl text-center cursor-pointer hover:scale-110 transition-all text-3xl font-bold" onclick="playNumber(3)" style="background: #45b7d1">
          ٣
        </div>
        <!-- Continue till 10 -->
        <div class="number-card p-8 rounded-3xl text-center cursor-pointer hover:scale-110 transition-all text-3xl font-bold" onclick="playNumber(10)" style="background: #96ceb4">
          ١٠
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="text-3xl font-bold mb-8 text-center">ماذا ترى؟</h2>
      <div class="flex flex-wrap gap-4 justify-center">
        <div class="p-8 rounded-3xl bg-gray-200 text-4xl font-bold cursor-pointer" onclick="countApples(3)">🍎🍎🍎</div>
        <div class="p-8 rounded-3xl bg-gray-200 text-4xl font-bold cursor-pointer" onclick="countApples(5)">🍎🍎🍎🍎🍎</div>
      </div>
    </div>
  </div>

  <script>
    function playNumber(num) {
      speechSynthesis.speak(new SpeechSynthesisUtterance(`${num}`));
    }

    function countApples(count) {
      speechSynthesis.speak(new SpeechSynthesisUtterance(`هناك ${count} تفاحة`));
    }
  </script>
</body>
</html>
