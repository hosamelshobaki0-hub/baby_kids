<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قطار الأرقام السحري 🚂</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* شكل رأس القطار */
        .train-engine {
            width: 120px;
            height: 100px;
            background: #e74c3c;
            border-radius: 20px 50px 10px 10px;
            position: relative;
            box-shadow: 0 10px 0 #c0392b;
        }
        .train-engine::before {
            content: "☁️";
            position: absolute;
            top: -30px;
            right: 20px;
            font-size: 2rem;
            animation: smoke 2s infinite;
        }

        /* تصميم العربات */
        .wagon {
            width: 100px;
            height: 80px;
            background: #f1c40f;
            border-radius: 15px;
            border: 4px dashed #d4ac0d;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wagon.drag-over {
            transform: scale(1.1);
            border-color: #2ecc71;
            background: #e8f5e9;
        }

        /* الأرقام القابلة للسحب */
        .num-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            cursor: grab;
            box-shadow: 0 6px 0 #ddd;
            transition: transform 0.2s;
            user-select: none;
        }

        .num-box:active { cursor: grabbing; transform: translateY(4px); box-shadow: none; }

        @keyframes smoke {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-50px) scale(2); opacity: 0; }
        }

        .correct-anim { animation: celebrate 0.5s ease; border-color: #2ecc71 !important; background: #2ecc71 !important; color: white; }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center bg-white/80 backdrop-blur p-4 rounded-2xl shadow-lg mb-8">
        <div class="text-2xl font-black text-blue-600">🚂 قطار الأرقام</div>
        <div class="bg-yellow-400 px-6 py-2 rounded-full font-bold shadow-sm">⭐ النجوم: <span id="star-count">0</span></div>
        <a href="games.html" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold">خروج</a>
    </nav>

    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl font-black text-gray-800 mb-8">رتب الأرقام من الأصغر إلى الأكبر! 🛤️</h1>

        <div class="flex items-end justify-center gap-4 mb-20 overflow-x-auto pb-8 pt-10" id="train-track">
            <div class="train-engine"></div>
            <div class="wagon" data-index="0"></div>
            <div class="wagon" data-index="1"></div>
            <div class="wagon" data-index="2"></div>
        </div>

        <div class="bg-white/50 p-8 rounded-3xl backdrop-blur-sm border-4 border-white">
            <div class="flex justify-center gap-6 mb-8" id="numbers-pool">
                </div>
            
            <button onclick="checkResult()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-black px-12 py-4 rounded-2xl shadow-[0_6px_0_#27ae60] transition-all active:translate-y-1 active:shadow-none">تحقق من الترتيب ✅</button>
            <button onclick="initGame()" class="mr-4 text-blue-600 font-bold underline">لعبة جديدة 🔄</button>
        </div>
    </div>

    <script>
        let correctSequence = [];
        let stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}').stars;
        document.getElementById('star-count').innerText = stars;

        function initGame() {
            const pool = document.getElementById('numbers-pool');
            const wagons = document.querySelectorAll('.wagon');
            pool.innerHTML = '';
            
            // توليد 3 أرقام عشوائية متتالية لزيادة الصعوبة (مثلاً 5, 6, 7)
            const startNum = Math.floor(Math.random() * 7) + 1;
            correctSequence = [startNum, startNum + 1, startNum + 2];
            
            // خلط الأرقام للعرض
            const shuffled = [...correctSequence].sort(() => Math.random() - 0.5);

            shuffled.forEach(num => {
                const el = document.createElement('div');
                el.className = 'num-box bg-white text-blue-600 border-2 border-blue-200';
                el.draggable = true;
                el.innerText = num;
                el.id = 'num-' + num;
                el.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
                pool.appendChild(el);
            });

            // تفريغ العربات
            wagons.forEach(w => {
                w.innerHTML = '';
                w.classList.remove('correct-anim');
                w.addEventListener('dragover', (e) => { e.preventDefault(); w.classList.add('drag-over'); });
                w.addEventListener('dragleave', () => w.classList.remove('drag-over'));
                w.addEventListener('drop', handleDrop);
            });
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            const data = e.dataTransfer.getData('text');
            const draggedEl = document.getElementById(data);
            
            // إذا كانت العربة ممتلئة، أعد الرقم القديم للمخزن
            if (this.children.length > 0) {
                document.getElementById('numbers-pool').appendChild(this.children[0]);
            }
            
            this.appendChild(draggedEl);
            playTickSound();
        }

        function checkResult() {
            const wagons = document.querySelectorAll('.wagon');
            let win = true;

            wagons.forEach((w, i) => {
                const val = w.children[0] ? parseInt(w.children[0].innerText) : null;
                if (val === correctSequence[i]) {
                    w.classList.add('correct-anim');
                } else {
                    win = false;
                    w.style.borderColor = '#e74c3c';
                    setTimeout(() => w.style.borderColor = '#d4ac0d', 1000);
                }
            });

            if (win) {
                stars += 5;
                saveStars();
                speak("ممتاز! القطار جاهز للانطلاق");
                setTimeout(initGame, 2000);
            } else {
                speak("أوه، هناك رقم في المكان الخطأ");
            }
        }

        function saveStars() {
            localStorage.setItem('gameProgress', JSON.stringify({stars: stars}));
            document.getElementById('star-count').innerText = stars;
        }

        function playTickSound() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        function speak(txt) {
            const ut = new SpeechSynthesisUtterance(txt);
            ut.lang = 'ar-SA';
            window.speechSynthesis.speak(ut);
        }

        window.onload = initGame;
    </script>
</body>
</html>
