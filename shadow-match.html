<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الظل السحري 👤 | Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #dfe6e9; text-align: center; margin: 0; overflow: hidden; }
        .container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-shape { font-size: 8rem; margin: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        .options-grid { display: flex; gap: 30px; margin-top: 50px; }
        .shadow-option { 
            font-size: 6rem; 
            filter: brightness(0); /* تحويل الشكل لظل أسود */
            cursor: pointer;
            transition: 0.3s;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 30px;
        }
        .shadow-option:hover { transform: scale(1.1); background: white; }
        .correct { filter: brightness(1) !important; background: #55efc4 !important; }
        .wrong { background: #ff7675 !important; }
        .score-badge { position: fixed; top: 20px; right: 20px; background: white; padding: 10px 30px; border-radius: 50px; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="score-badge">⭐ <span id="stars">0</span></div>

    <div class="container">
        <h1 style="color: #2d3436;">أين ظلي الصحيح؟</h1>
        <div id="target-emoji" class="main-shape">🍎</div>
        
        <div class="options-grid" id="options">
            </div>
    </div>

    <script>
        const items = ['🍎', '🚗', '🦁', '🍌', '🐘', '🍦', '🧸', '🥦'];
        let stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}').stars;
        document.getElementById('stars').innerText = stars;

        function nextLevel() {
            const optionsArea = document.getElementById('options');
            optionsArea.innerHTML = '';
            
            // اختيار شكل عشوائي للهدف
            const target = items[Math.floor(Math.random() * items.length)];
            document.getElementById('target-emoji').innerText = target;

            // توليد خيارات (الهدف + شكلين آخرين)
            let choices = [target];
            while(choices.length < 3) {
                let r = items[Math.floor(Math.random() * items.length)];
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'shadow-option';
                div.innerText = emoji;
                div.onclick = () => check(emoji, div, target);
                optionsArea.appendChild(div);
            });
        }

        function check(selected, el, target) {
            if(selected === target) {
                el.classList.add('correct');
                stars += 5;
                updateProgress();
speak('success');
                setTimeout(nextLevel, 1500);
            } else {
                el.classList.add('wrong');
speak('error');
                setTimeout(() => el.classList.remove('wrong'), 500);
            }
        }

function speak(type) {
            speakEgyptian(type);
        }
        
        // Load scripts
        const script1 = document.createElement('script');
        script1.src = 'shared-script.js';
        document.head.appendChild(script1);
        
        const script2 = document.createElement('script');
        script2.src = 'mascot-egyptian.js';
        document.head.appendChild(script2);

        function updateProgress() {
            document.getElementById('stars').innerText = stars;
            localStorage.setItem('gameProgress', JSON.stringify({stars: stars}));
        }

        nextLevel();
    </script>
</body>
</html>
