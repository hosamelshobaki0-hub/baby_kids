<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرة الحروف العربية 📖</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fdfcfe; overflow-x: hidden; }
        
        .letter-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-bottom: 8px solid #e2e8f0;
            background: white;
        }
        
        .letter-card:hover { 
            transform: translateY(-12px) scale(1.03); 
            border-color: #6366f1;
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.2);
        }

        .letter-card:active { transform: scale(0.9); }

        /* تأثير النجمة عند الفوز */
        .star-pop { 
            animation: starPop 1s ease-out forwards; 
            position: fixed; pointer-events: none; z-index: 100;
        }
        @keyframes starPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -80%) scale(2); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
        }

        /* أنيميشن دخول الحروف */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-10 bg-white p-6 rounded-[35px] shadow-sm border-b-4 border-indigo-50">
        <a href="learning-menu.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all flex items-center gap-2">
            <span>⬅️</span> عودة للدروس
        </a>
        <div class="flex items-center gap-4">
            <div class="bg-amber-50 px-6 py-3 rounded-3xl border-2 border-amber-200 flex items-center gap-3">
                <span class="text-3xl">⭐</span>
                <span id="star-count-ui" class="text-3xl font-black text-indigo-900">0</span>
            </div>
        </div>
    </nav>

    <div class="text-center mb-12">
        <h1 class="text-4xl font-black text-slate-800 mb-2">أبجدية لغتي الجميلة 📖</h1>
        <p class="text-slate-500 text-lg font-bold">اضغط على الحرف لتسمع نُطقه وتكتشف رفيقه!</p>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-6" id="alphabet-grid">
        </div>

    <script>
        const alphabet = [
            { char: 'أ', name: 'أرنب', icon: '🐰', sound: 'ألف' }, 
            { char: 'ب', name: 'بطة', icon: '🦆', sound: 'باء' },
            { char: 'ت', name: 'تفاحة', icon: '🍎', sound: 'تاء' }, 
            { char: 'ث', name: 'ثعلب', icon: '🦊', sound: 'ثاء' },
            { char: 'ج', name: 'جمل', icon: '🐪', sound: 'جيم' }, 
            { char: 'ح', name: 'حصان', icon: '🐎', sound: 'حاء' },
            { char: 'خ', name: 'خروف', icon: '🐑', sound: 'خاء' }, 
            { char: 'د', name: 'ديك', icon: '🐓', sound: 'دال' },
            { char: 'ذ', name: 'ذرة', icon: '🌽', sound: 'ذال' }, 
            { char: 'ر', name: 'رمان', icon: '🍎', sound: 'راء' },
            { char: 'ز', name: 'زرافة', icon: '🦒', sound: 'زاي' }, 
            { char: 'س', name: 'سمكة', icon: '🐟', sound: 'سين' },
            { char: 'ش', name: 'شمس', icon: '☀️', sound: 'شين' }, 
            { char: 'ص', name: 'صقر', icon: '🦅', sound: 'صاد' },
            { char: 'ض', name: 'ضفدع', icon: '🐸', sound: 'ضاد' }, 
            { char: 'ط', name: 'طائرة', icon: '✈️', sound: 'طاء' },
            { char: 'ظ', name: 'ظرف', icon: '✉️', sound: 'ظاء' }, 
            { char: 'ع', name: 'عين', icon: '👁️', sound: 'عين' },
            { char: 'غ', name: 'غزالة', icon: '🦌', sound: 'غين' }, 
            { char: 'ف', name: 'فيل', icon: '🐘', sound: 'فاء' },
            { char: 'ق', name: 'قرد', icon: '🐒', sound: 'قاف' }, 
            { char: 'ك', name: 'كلب', icon: '🐕', sound: 'كاف' },
            { char: 'ل', name: 'ليمون', icon: '🍋', sound: 'لام' }, 
            { char: 'م', name: 'موز', icon: '🍌', sound: 'ميم' },
            { char: 'ن', name: 'نحلة', icon: '🐝', sound: 'نون' }, 
            { char: 'هـ', name: 'هلال', icon: '🌙', sound: 'هاء' },
            { char: 'و', name: 'وردة', icon: '🌹', sound: 'واو' }, 
            { char: 'ي', name: 'يد', icon: '✋', sound: 'ياء' }
        ];

        const grid = document.getElementById('alphabet-grid');
        let counter = 0;

        function updateStarUI() {
            const data = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
            document.getElementById('star-count-ui').innerText = data.stars;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        alphabet.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "letter-card p-6 rounded-[40px] text-center animate-in";
            card.style.animationDelay = (index * 0.05) + "s";
            
            card.innerHTML = `
                <div class="text-6xl font-black text-indigo-600 mb-3">${item.char}</div>
                <div class="text-3xl">${item.icon}</div>
                <div class="text-sm font-bold text-slate-400 mt-2">${item.name}</div>
            `;
            
            card.onclick = () => {
                speak(`حرف الـ ${item.sound} .. ${item.name}`);
                
                // إضافة حركة بسيطة
                card.classList.add('bg-indigo-50');
                setTimeout(() => card.classList.remove('bg-indigo-50'), 300);
                
                counter++;
                if (counter % 5 === 0) giveBonusStar();
            };
            
            grid.appendChild(card);
        });

        function giveBonusStar() {
            let data = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
            data.stars += 2;
            localStorage.setItem('gameProgress', JSON.stringify(data));
            updateStarUI();

            const star = document.createElement('div');
            star.className = "fixed top-1/2 left-1/2 text-8xl star-pop";
            star.innerText = "⭐";
            document.body.appendChild(star);
            
            speak("أحسنت يا بطل! استمر في التعلم");
            setTimeout(() => star.remove(), 1000);
        }

        window.onload = () => {
            updateStarUI();
            setTimeout(() => speak("هيا يا بطل.. لنتعلم حروف لغتنا الجميلة! اضغط على أي حرف"), 500);
        };
    </script>
</body>
</html>
