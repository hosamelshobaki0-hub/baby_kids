<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذكاء | الذاكرة الخارقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-memory: #6c5ce7;
            --card-back: #a29bfe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Cairo', sans-serif;
            background: var(--bg-memory);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: white;
        }

        .header {
            width: 100%; padding: 15px 30px; background: rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        .game-info { font-size: 1.2rem; background: #fdcb6e; color: #333; padding: 5px 15px; border-radius: 15px; }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 40px;
            perspective: 1000px;
            width: 90%; max-width: 600px;
        }

        /* تصميم البطاقة السحري */
        .memory-card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .memory-card.flip { transform: rotateY(180deg); }

        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; border-radius: 20px; border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .back { background: var(--card-back); }
        .back::after { content: '❓'; font-size: 2rem; opacity: 0.5; }

        .front {
            background: white;
            transform: rotateY(180deg);
        }

        .matched {
            animation: pulse 0.5s ease infinite alternate;
            visibility: visible !important;
        }

        @keyframes pulse {
            from { transform: rotateY(180deg) scale(1); }
            to { transform: rotateY(180deg) scale(1.1); }
        }

        .controls { margin-top: 30px; display: flex; gap: 20px; }
        .btn {
            padding: 12px 30px; border-radius: 50px; border: none;
            font-weight: 900; cursor: pointer; font-family: inherit;
            transition: 0.3s;
        }
        .btn-restart { background: #fab1a0; color: #333; }
        .btn-home { background: #55efc4; color: #333; }

        @media (max-width: 480px) {
            .memory-grid { grid-template-columns: repeat(3, 1fr); }
            .front, .back { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="game-info">⭐ النجوم: <span id="stars">0</span></div>
        <h2>تحدي الذاكرة 🧠</h2>
        <div class="game-info">محاولات: <span id="moves">0</span></div>
    </div>

    <div class="memory-grid" id="game-grid">
        </div>

    <div class="controls">
        <button class="btn btn-restart" onclick="startGame()">إعادة اللعبة 🔄</button>
        <button class="btn btn-home" onclick="location.href='games.html'">الخروج 🏠</button>
    </div>

    <script>
        const icons = ['🦁', '🦁', '🐘', '🐘', '🦒', '🦒', '🦓', '🦓', '🐱', '🐱', '🐶', '🐶'];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matches = 0;
        let gameProgress = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}');

        function startGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            moves = 0;
            matches = 0;
            document.getElementById('moves').innerText = moves;
            document.getElementById('stars').innerText = gameProgress.stars;
            
            // خلط البطاقات
            const shuffled = icons.sort(() => 0.5 - Math.random());

            shuffled.forEach(icon => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="front">${icon}</div>
                    <div class="back"></div>
                `;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            moves++;
            document.getElementById('moves').innerText = moves;
            
            let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            matches++;
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            speak(firstCard.dataset.icon === '🦁' ? "أسد" : 
                  firstCard.dataset.icon === '🐘' ? "فيل" : 
                  firstCard.dataset.icon === '🦒' ? "زرافة" : "صديق جديد");

            resetBoard();
            
            if (matches === icons.length / 2) {
                winGame();
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function winGame() {
            const bonusStars = moves <= 10 ? 10 : 5;
            gameProgress.stars += bonusStars;
            localStorage.setItem('gameProgress', JSON.stringify(gameProgress));
            
            setTimeout(() => {
                alert(`ممتاز يا بطل! أنهيت التحدي في ${moves} محاولة وحصلت على ${bonusStars} نجوم! ⭐`);
                location.href = 'games.html';
            }, 500);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        window.onload = startGame;
    </script>
</body>
</html>
