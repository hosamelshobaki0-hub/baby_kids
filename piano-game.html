<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بيانو الألوان السحري 🎹</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f0f2f5;
      --header-bg: #6c5ce7;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-color);
      margin: 0;
      overflow-x: hidden;
      touch-action: manipulation; /* لتحسين اللمس على الموبايل */
    }

    /* رأس الصفحة */
    .top-bar {
      background: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .nav-btn {
      text-decoration: none;
      background: #ff7675;
      color: white;
      padding: 8px 20px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .star-counter {
      background: #fdcb6e;
      padding: 8px 20px;
      border-radius: 50px;
      color: #d35400;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* حاوية البيانو */
    .piano-wrapper {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }

    .piano-container {
      display: flex;
      justify-content: center;
      background: #2d3436;
      padding: 20px 10px 10px;
      border-radius: 20px;
      box-shadow: 0 20px 0 #1e272e;
      gap: 8px;
    }

    .piano-key {
      flex: 1;
      height: 250px;
      border-radius: 0 0 15px 15px;
      cursor: pointer;
      position: relative;
      transition: all 0.1s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 20px;
      color: white;
      font-weight: 900;
      font-size: 1.2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      border: 2px solid rgba(0,0,0,0.1);
      user-select: none;
    }
    
    .piano-key.playing {
      height: 235px;
      transform: translateY(5px);
      filter: brightness(1.3);
      box-shadow: 0 0 25px var(--key-color);
    }

    .piano-key:active {
      height: 235px;
      transform: translateY(5px);
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
    }

    /* أزرار التحكم */
    .controls {
      margin-top: 50px;
    }

    .play-melody-btn {
      background: #6c5ce7;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.5rem;
      font-family: 'Cairo';
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 #4834d4;
      transition: 0.2s;
    }

    .play-melody-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #4834d4;
    }

    .combo-box {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #636e72;
    }

    /* نوتات موسيقية طائرة */
    .note-animation {
      position: absolute;
      font-size: 2rem;
      animation: flyUp 1s forwards;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes flyUp {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(-150px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <nav class="top-bar">
    <a href="games.html" class="nav-btn">🔙 خروج</a>
    <div class="star-counter">⭐ <span id="stars-total">0</span></div>
  </nav>

  <div class="piano-wrapper">
    <h1 style="font-size: 2.5rem; color: #2d3436; margin-bottom: 10px;">بيانو الألوان الموسيقي 🎵</h1>
    <p style="color: #636e72; margin-bottom: 30px;">اضغط على الألوان لتسمع أجمل الألحان!</p>

    <div class="piano-container" id="piano-body">
      </div>

    <div class="controls">
      <button onclick="playMelody()" class="play-melody-btn">🎼 عزف لحن سحري</button>
      <div class="combo-box">نقاط العزف: <span id="combo-count" style="color: #6c5ce7; font-weight: 900;">0</span></div>
    </div>
  </div>

  <script>
    const pianoKeys = [
      { note: 261.63, color: '#ff4757', name: 'أحمر' },
      { note: 293.66, color: '#3742fa', name: 'أزرق' },
      { note: 329.63, color: '#ffa502', name: 'أصفر' },
      { note: 349.23, color: '#2ed573', name: 'أخضر' },
      { note: 392.00, color: '#ff6348', name: 'برتقالي' },
      { note: 440.00, color: '#5f27cd', name: 'بنفسجي' },
      { note: 493.88, color: '#10ac84', name: 'تركواز' }
    ];

    let combo = 0;
    let audioContext;
    let stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}').stars;

    document.getElementById('stars-total').innerText = stars;

    function initPiano() {
      const container = document.getElementById('piano-body');
      pianoKeys.forEach((key) => {
        const keyEl = document.createElement('div');
        keyEl.className = 'piano-key';
        keyEl.style.setProperty('--key-color', key.color);
        keyEl.style.background = key.color;
        keyEl.innerHTML = `<span>${key.name}</span>`;
        
        // دعم اللمس والماوس
        keyEl.onmousedown = () => handleKeyPress(key, keyEl);
        keyEl.ontouchstart = (e) => {
          e.preventDefault();
          handleKeyPress(key, keyEl);
        };
        
        container.appendChild(keyEl);
      });
    }

    function handleKeyPress(key, element) {
      playSound(key.note);
      speak(key.name);
      createNoteIcon(element);
      
      element.classList.add('playing');
      setTimeout(() => element.classList.remove('playing'), 200);

      combo++;
      document.getElementById('combo-count').textContent = combo;

      // كل 10 نغمات يحصل على نجمة
      if (combo % 10 === 0) {
        stars++;
        saveStars();
      }
    }

    function playSound(frequency) {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = frequency;
      oscillator.type = 'triangle'; // صوت أنعم للأطفال
      
      // Envelope تحسين مغلف الصوت لجعله يبدو كالبيانو الحقيقي
      gainNode.gain.setValueAtTime(0, audioContext.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.4, audioContext.currentTime + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
      
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.8);
    }

    function speak(text) {
      window.speechSynthesis.cancel(); // إلغاء أي نطق سابق لتجنب التداخل
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ar-SA';
      msg.rate = 1.2;
      window.speechSynthesis.speak(msg);
    }

    function createNoteIcon(parent) {
      const note = document.createElement('div');
      note.className = 'note-animation';
      note.innerText = '🎵';
      note.style.left = (parent.offsetLeft + parent.offsetWidth/2) + 'px';
      note.style.top = parent.offsetTop + 'px';
      document.body.appendChild(note);
      setTimeout(() => note.remove(), 1000);
    }

    function playMelody() {
      const melody = [0, 2, 4, 0, 2, 4, 5, 4, 2, 0];
      let i = 0;
      const interval = setInterval(() => {
        if (i < melody.length) {
          const keyData = pianoKeys[melody[i]];
          const elements = document.querySelectorAll('.piano-key');
          handleKeyPress(keyData, elements[melody[i]]);
          i++;
        } else {
          clearInterval(interval);
        }
      }, 500);
    }

    function saveStars() {
      document.getElementById('stars-total').innerText = stars;
      localStorage.setItem('gameProgress', JSON.stringify({stars: stars}));
    }

    window.onload = initPiano;
  </script>
</body>
</html>
