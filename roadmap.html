<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خريطة الكنز الأسطورية 🗺️ | v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --gold: #fcc419;
      --map-path: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* تأثير الخلفية المتحركة */
    .space-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
    }

    .floating-item {
      position: absolute;
      pointer-events: none;
      animation: float 6s infinite ease-in-out;
      opacity: 0.3;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* تصميم المسار المنقط */
    .roadmap-section::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; right: 40px;
      width: 4px;
      border-right: 4px dotted var(--map-path);
      z-index: 0;
    }

    .game-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      z-index: 1;
    }

    .ready-to-play:hover {
      transform: scale(1.1) rotate(2deg);
      filter: brightness(1.2);
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }

    .locked {
      filter: grayscale(1) opacity(0.4);
      cursor: not-allowed;
      border: 2px dashed rgba(255,255,255,0.1) !important;
    }

    /* أنيميشن لفتح القفل */
    .unlock-shine {
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .custom-scroll::-webkit-scrollbar { width: 8px; }
    .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body class="custom-scroll">

  <div class="space-bg">
    <div class="floating-item text-4xl" style="top: 10%; left: 10%;">☁️</div>
    <div class="floating-item text-4xl" style="top: 30%; right: 15%; animation-delay: 1s;">⭐</div>
    <div class="floating-item text-4xl" style="bottom: 20%; left: 20%; animation-delay: 2s;">🚀</div>
    <div class="floating-item text-4xl" style="top: 60%; right: 5%; animation-delay: 3s;">🪐</div>
  </div>

  <header class="fixed top-0 w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex flex-col">
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">خريطة الأساطير</h1>
        <div class="flex items-center gap-2 mt-1">
          <div class="w-24 h-2 bg-white/10 rounded-full overflow-hidden">
            <div id="main-progress" class="h-full bg-gradient-to-r from-blue-500 to-emerald-500 transition-all duration-1000"></div>
          </div>
          <span id="progress-percent" class="text-[10px] text-white/50 font-bold">0%</span>
        </div>
      </div>

      <div class="flex items-center gap-4">
          <button onclick="location.href='bunny-friend.html'" class="hidden md:flex items-center gap-2 bg-purple-600/20 hover:bg-purple-600/40 border border-purple-500/30 px-3 py-1 rounded-full transition-all">
            <span class="text-xl">🐰</span>
            <span class="text-xs font-bold">تحدث مع أرنوب</span>
          </button>
          
          <div class="bg-yellow-500/10 px-4 py-2 rounded-2xl flex items-center gap-2 border border-yellow-500/20">
              <span class="text-xl">⭐</span>
              <span id="stars-count" class="text-xl font-black text-yellow-400">0</span>
          </div>
      </div>
    </div>
  </header>

  <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
    <div id="roadmap-container" class="space-y-20 relative">
      </div>
  </main>

  <script>
    const appData = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
    
    const categories = [
      {
        id: 'edu',
        title: 'مملكة المعرفة',
        icon: '🏰',
        color: 'from-blue-600 to-blue-400',
        minStars: 0,
        pages: [
          { name: 'alphabet-ar.html', title: 'حروف الضاد', emoji: '🦁', info: 'تعلم العربية' },
          { name: 'alphabet-en.html', title: 'Smart ABC', emoji: '🍎', info: 'Learn English' },
          { name: 'numbers-train.html', title: 'قطار الأرقام', emoji: '🚂', info: '1, 2, 3...' },
          { name: 'colors-world.html', title: 'عالم الألوان', emoji: '🌈', info: 'تلوين مرح' }
        ]
      },
      {
        id: 'games',
        title: 'جزيرة المغامرات',
        icon: '🌴',
        color: 'from-emerald-600 to-teal-400',
        minStars: 10,
        pages: [
          { name: 'shadow-match.html', title: 'تطابق الظلال', emoji: '👤', info: 'قوة الملاحظة' },
          { name: 'balloon-pop.html', title: 'فرقعة بالونات', emoji: '🎈', info: 'سرعة البديهة' },
          { name: 'memory-game.html', title: 'تحدي الذاكرة', emoji: '🧠', info: 'تنشيط العقل' },
          { name: 'food-game.html', title: 'صحي أم لا؟', emoji: '🍎', info: 'ثقافة غذائية' }
        ]
      },
      {
        id: 'bunny-special',
        title: 'مخبأ أرنوب السري',
        icon: '🥕',
        color: 'from-purple-600 to-indigo-400',
        minStars: 20,
        pages: [
          { name: 'bunny-friend.html', title: 'صديقي أرنوب', emoji: '🐰', info: 'دردشة ولعب' },
          { name: 'bunny-care.html', title: 'رعاية أرنوب', emoji: '🛁', info: 'مسؤولية' }
        ]
      }
    ];

    function renderRoadmap() {
      const container = document.getElementById('roadmap-container');
      const stars = appData.stars;
      document.getElementById('stars-count').innerText = stars;
      
      const targetStars = 50;
      const progress = Math.min((stars/targetStars)*100, 100);
      document.getElementById('main-progress').style.width = progress + '%';
      document.getElementById('progress-percent').innerText = Math.floor(progress) + '%';

      container.innerHTML = '';

      categories.forEach((cat, index) => {
        const isLocked = stars < cat.minStars;
        const section = document.createElement('div');
        section.className = 'roadmap-section relative';
        
        section.innerHTML = `
          <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-2xl border border-white/10">
              ${cat.icon}
            </div>
            <div>
              <h3 class="text-2xl font-black text-white">${cat.title}</h3>
              <p class="text-sm text-white/40 font-bold uppercase tracking-widest">
                ${isLocked ? `🔓 يفتح عند ${cat.minStars} نجمة` : '✨ منطقة مفتوحة'}
              </p>
            </div>
          </div>
        `;

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6';

        cat.pages.forEach(page => {
          const card = document.createElement('div');
          card.className = `game-card group p-6 rounded-[32px] border-b-4 transition-all duration-300
            ${isLocked ? 'locked bg-slate-900 border-slate-800' : `bg-gradient-to-br ${cat.color} border-black/20 ready-to-play shadow-lg`}`;
          
          card.innerHTML = `
            ${!isLocked ? '<div class="unlock-shine"></div>' : ''}
            <div class="relative z-10 text-center">
              <div class="text-6xl mb-4 transform transition-all group-hover:scale-125 group-hover:rotate-12">${page.emoji}</div>
              <div class="font-black text-xl mb-1">${page.title}</div>
              <div class="text-[10px] font-bold text-white/60 bg-black/20 py-1 px-3 rounded-full inline-block uppercase tracking-tighter">
                ${page.info}
              </div>
            </div>
          `;

          if (!isLocked) {
            card.onclick = (e) => {
              createClickCircle(e);
              playSFX(880, 'sine');
              setTimeout(() => window.location.href = page.name, 400);
            };
          } else {
            card.onclick = () => playSFX(150, 'sawtooth'); // صوت قفل
          }

          grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    // تأثير دائرة الضغط
    function createClickCircle(e) {
      const circle = document.createElement('div');
      circle.className = 'fixed bg-white/30 rounded-full pointer-events-none z-[100]';
      circle.style.width = '20px';
      circle.style.height = '20px';
      circle.style.left = (e.clientX - 10) + 'px';
      circle.style.top = (e.clientY - 10) + 'px';
      circle.style.animation = 'ping 0.5s ease-out forwards';
      document.body.appendChild(circle);
      setTimeout(() => circle.remove(), 500);
    }

    function playSFX(freq, type) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      } catch(e) {}
    }

    window.onload = renderRoadmap;
  </script>
</body>
</html>
