<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متحف الأوسمة الملكي 🏆</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
      min-height: 100vh;
      color: white;
    }

    /* تأثير اللمعة الذهبية للأوسمة المفتوحة */
    .badge-card {
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .badge-unlocked {
      background: linear-gradient(145deg, #f1c40f, #d35400);
      box-shadow: 0 0 20px rgba(241, 196, 15, 0.4), inset 0 0 15px rgba(255,255,255,0.5);
    }

    .badge-unlocked::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 100%; }
      100% { left: 100%; }
    }

    .badge-locked {
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      filter: grayscale(1) blur(0.5px);
    }

    /* نافذة العرض المكبر */
    #badge-modal {
      display: none;
      backdrop-filter: blur(10px);
    }

    .float-anim { animation: float 3s infinite ease-in-out; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12 bg-white/10 p-4 rounded-3xl border border-white/10">
    <div class="text-2xl font-black flex items-center gap-3">
      <span class="text-4xl">🏛️</span> متحف الأوسمة
    </div>
    <div class="flex gap-3">
      <button onclick="location.href='games.html'" class="bg-yellow-500 text-black font-bold px-6 py-2 rounded-2xl hover:bg-yellow-400 transition-all">العودة للعب ⭐</button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto text-center">
    <h1 class="text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-orange-500">خزانتك الأسطورية 🏆</h1>
    <p class="text-gray-400 mb-12">اضغط على أي وسام لرؤية تفاصيله السحرية!</p>

    <div id="badges-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8 mb-16">
      </div>

    <div class="bg-white/5 border border-white/10 p-8 rounded-[40px] max-w-2xl mx-auto">
        <div class="flex justify-around items-center">
            <div>
                <div class="text-5xl font-black text-yellow-500" id="unlocked-count">0</div>
                <div class="text-gray-400">وسام مكتمل</div>
            </div>
            <div class="h-16 w-px bg-white/10"></div>
            <div>
                <div class="text-5xl font-black text-blue-400" id="total-stars">0</div>
                <div class="text-gray-400">نجمة إجمالية</div>
            </div>
        </div>
        <button onclick="shareWithFamily()" class="mt-8 bg-green-500 text-white font-bold px-10 py-4 rounded-2xl shadow-[0_5px_0_#2ecc71] active:translate-y-1 active:shadow-none transition-all">
            📱 أرسل صورة إنجازاتي لماما وبابا
        </button>
    </div>
  </div>

  <div id="badge-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80" onclick="closeModal()"></div>
    <div class="relative bg-gradient-to-b from-gray-800 to-gray-900 p-10 rounded-[50px] border-4 border-yellow-500 max-w-md w-full text-center">
        <div id="modal-emoji" class="text-9xl mb-6 float-anim">🌈</div>
        <h2 id="modal-name" class="text-3xl font-black text-white mb-2">اسم الوسام</h2>
        <p id="modal-desc" class="text-yellow-500 font-bold mb-6">مهمة الوسام</p>
        <div id="modal-status" class="bg-white/10 p-4 rounded-2xl text-gray-300 mb-8 italic"></div>
        <button onclick="closeModal()" class="w-full bg-white text-black font-black py-4 rounded-2xl text-xl">رائع! ✨</button>
    </div>
  </div>

  <script>
    const badgesData = [
      { id: 'color-master', name: 'ملك الألوان', emoji: '🌈', desc: 'تعلمت كل الألوان الجميلة!', hint: 'انهي لعبة الألوان بـ 10 نجوم', unlocked: true, date: '2024-01-15' },
      { id: 'number-genius', name: 'عبقري الأرقام', emoji: '🔢', desc: 'أتقنت فن العد والترتيب!', hint: 'رتب قطار الأرقام 3 مرات', unlocked: true, date: '2024-01-18' },
      { id: 'animal-expert', name: 'خبير الغابة', emoji: '🐘', desc: 'تعرفت على أصوات جميع الحيوانات!', hint: 'العب لعبة الأصوات دون أخطاء', unlocked: true, date: '2024-02-10' },
      { id: 'memory-champ', name: 'بطل الذاكرة', emoji: '🧠', desc: 'ذاكرتك قوية جداً كالفيل!', hint: 'انهي لعبة الذاكرة في أقل من دقيقة', unlocked: false },
      { id: 'star-collector', name: 'جامع النجوم', emoji: '✨', desc: 'جمعت أكثر من 100 نجمة!', hint: 'اجمع 100 نجمة من كل الألعاب', unlocked: false },
      { id: 'fast-thinker', name: 'المفكر السريع', emoji: '⚡', desc: 'تجاوزت التحديات بسرعة البرق!', hint: 'حل 5 مسائل حسابية في دقيقة', unlocked: false }
    ];

    function renderBadges() {
      const grid = document.getElementById('badges-grid');
      const stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}').stars;
      document.getElementById('total-stars').innerText = stars;
      grid.innerHTML = '';

      badgesData.forEach(badge => {
        const el = document.createElement('div');
        el.className = `badge-card p-6 rounded-[35px] text-center cursor-pointer ${badge.unlocked ? 'badge-unlocked' : 'badge-locked'}`;
        el.innerHTML = `
          <div class="text-6xl mb-4 transition-transform group-hover:scale-110">${badge.unlocked ? badge.emoji : '❓'}</div>
          <div class="font-black text-lg ${badge.unlocked ? 'text-black' : 'text-gray-500'}">${badge.name}</div>
        `;
        el.onclick = () => showBadgeDetails(badge);
        grid.appendChild(el);
      });

      document.getElementById('unlocked-count').innerText = badgesData.filter(b => b.unlocked).length;
    }

    function showBadgeDetails(badge) {
      const modal = document.getElementById('badge-modal');
      document.getElementById('modal-emoji').innerText = badge.unlocked ? badge.emoji : '🔒';
      document.getElementById('modal-name').innerText = badge.unlocked ? badge.name : 'وسام مخفي';
      document.getElementById('modal-desc').innerText = badge.unlocked ? badge.desc : 'لم تحصل عليه بعد';
      document.getElementById('modal-status').innerText = badge.unlocked ? `تم الحصول عليه في: ${new Date(badge.date).toLocaleDateString('ar')}` : `كيف تحصل عليه؟ ${badge.hint}`;
      
      modal.style.display = 'flex';
      playPopSound();
    }

    function closeModal() {
      document.getElementById('badge-modal').style.display = 'none';
    }

    function shareWithFamily() {
      const count = badgesData.filter(b => b.unlocked).length;
      alert(`🎉 تم تجهيز الرسالة:\n"ماما، بابا.. أنا بطل! جمعت ${count} أوسمة في تعليمي! 🏆"`);
    }

    function playPopSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
    }

    window.onload = renderBadges;
  </script>
</body>
</html>
