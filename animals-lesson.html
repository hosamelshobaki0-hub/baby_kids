<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>درس الحيوانات | تعليمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="age-kid">
  <nav class="header">
    <div class="logo">🐘 درس الحيوانات</div>
    <div>
      <a href="child-dashboard.html" class="nav-btn">🏠</a>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-center mb-12">الحيوانات البرية 🦁</h1>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
      <div class="animal-card p-8 rounded-3xl cursor-pointer hover:scale-105" onclick="speakAnimal('الأسد')" style="background: linear-gradient(45deg, #f093fb, #f5576c)">
        <div class="text-6xl mb-4">🦁</div>
        <div class="text-xl font-bold">الأسد</div>
      </div>
      <div class="animal-card p-8 rounded-3xl cursor-pointer hover:scale-105" onclick="speakAnimal('الفيل')" style="background: linear-gradient(45deg, #4facfe, #00f2fe)">
        <div class="text-6xl mb-4">🐘</div>
        <div class="text-xl font-bold">الفيل</div>
      </div>
      <!-- Add tiger, monkey, etc. -->
    </div>
  </div>

  <script>
    function speakAnimal(name) {
      speechSynthesis.speak(new SpeechSynthesisUtterance(name));
    }
  </script>
</body>
</html>
