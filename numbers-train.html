<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قطار الأرقام السعيد 🚂</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* سكة القطار */
    .tracks {
      position: absolute;
      bottom: 100px;
      width: 200%;
      height: 20px;
      background: repeating-linear-gradient(90deg, #5d4037 0px, #5d4037 20px, transparent 20px, transparent 40px);
      border-top: 5px solid #3e2723;
      animation: trackMove 10s linear infinite;
    }

    @keyframes trackMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* عربات القطار */
    .train-container {
      display: flex;
      gap: 10px;
      padding: 50px;
      align-items: flex-end;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 150px;
    }

    .wagon {
      min-width: 140px;
      height: 120px;
      border-radius: 20px 20px 5px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 8px solid rgba(0,0,0,0.2);
    }

    .wagon:hover { transform: translateY(-15px) scale(1.05); }

    .wagon::after, .wagon::before {
      content: '';
      position: absolute;
      bottom: -20px;
      width: 35px;
      height: 35px;
      background: #333;
      border-radius: 50%;
      border: 4px solid #666;
    }
    .wagon::after { right: 15px; }
    .wagon::before { left: 15px; }

    .engine {
      min-width: 160px;
      height: 150px;
      background: #ef4444;
      border-radius: 40px 100px 10px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* سحابة الدخان */
    .smoke {
      position: absolute;
      top: -20px;
      right: 20px;
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: smokeRise 2s infinite;
    }

    @keyframes smokeRise {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      100% { transform: translateY(-100px) scale(3); opacity: 0; }
    }
  </style>
</head>
<body class="relative">

  <nav class="p-6 flex justify-between items-center relative z-10">
    <a href="roadmap.html" class="bg-white/80 backdrop-blur px-6 py-2 rounded-2xl font-bold shadow-lg text-blue-600">🏠 الخريطة</a>
    <div class="text-2xl font-black bg-yellow-400 px-6 py-2 rounded-full shadow-lg text-white">قطار الأرقام 🚂</div>
  </nav>

  <div class="train-container mt-20" id="train">
    <div class="engine relative shadow-2xl border-b-8 border-red-700">
      🚂
      <div class="smoke"></div>
      <div class="smoke" style="animation-delay: 0.5s"></div>
    </div>
    </div>

  <div class="tracks"></div>

  <script>
    const train = document.getElementById('train');
    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#a855f7', '#14b8a6', '#ef4444'];
    let lastNumber = 0;

    function initTrain() {
      for (let i = 1; i <= 10; i++) {
        const wagon = document.createElement('div');
        wagon.className = 'wagon shadow-xl';
        wagon.style.backgroundColor = colors[i-1];
        wagon.innerHTML = `
          <div class="text-5xl font-black text-white">${i}</div>
        `;

        wagon.onclick = () => {
          playNumber(i);
          checkSequence(i);
          // تأثير القفز عند الضغط
          wagon.style.transform = 'scale(1.2)';
          setTimeout(() => wagon.style.transform = '', 200);
        };

        train.appendChild(wagon);
      }
    }

    function playNumber(num) {
      const msg = new SpeechSynthesisUtterance(num.toString());
      msg.lang = 'ar-SA';
      msg.rate = 0.9;
      window.speechSynthesis.speak(msg);
    }

    function checkSequence(num) {
        if (num === lastNumber + 1) {
            lastNumber = num;
            if (num === 10) {
                giveBonusStars();
                lastNumber = 0; // إعادة التحدي
            }
        } else {
            lastNumber = 0; // إذا أخطأ يبدأ من الأول
        }
    }

    function giveBonusStars() {
        const appData = JSON.parse(localStorage.getItem('gameProgress') || '{"stars":0}');
        appData.stars += 2;
        localStorage.setItem('gameProgress', JSON.stringify(appData));
        
        const winMsg = new SpeechSynthesisUtterance("رائع! لقد رتبت الأرقام بشكل صحيح، خذ نجمتين!");
        winMsg.lang = 'ar-SA';
        window.speechSynthesis.speak(winMsg);
        
        alert("🎉 بطل الأرقام! حصلت على نجمتين ⭐⭐");
    }

    initTrain();

    // رسالة البداية
    window.onload = () => {
        const welcome = new SpeechSynthesisUtterance("أهلاً بك في قطار الأرقام، اضغط على العربات لنتعلم العد معاً");
        welcome.lang = 'ar-SA';
        window.speechSynthesis.speak(welcome);
    };
  </script>
</body>
</html>
