<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيد الأرقام السحرية 🎣 | Kids Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <style>
        /* ستايل خاص باللعبة (الألوان البحرية) */
        body {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            overflow: hidden; /* لمنع التمرير أثناء اللعب */
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 80vh; /* مساحة اللعب */
            margin-top: 20px;
        }

        /* تصميم الفقاعات السحرية (Glassmorphism) */
        .bubble {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none; /* منع تحديد النص */
        }

        .bubble:active {
            transform: scale(0.9); /* تأثير الضغط */
        }

        /* حركة الفقاعات للأعلى */
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        /* تأثير الفرقعة (Popping Animation) */
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .popped {
            animation: pop 0.3s ease-out forwards !important;
        }

        /* لوحة الهدف (المطلوب صيده) */
        .target-panel {
            text-align: center;
            color: white;
            font-size: 2rem;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #target-number {
            font-size: 4rem;
            color: #fdcb6e;
            font-weight: 900;
            margin: 0 10px;
        }
    </style>
</head>
<body class="age-kid">

    <nav class="smart-header">
        <button class="btn-universal btn-primary" style="background: #ff7675;" onclick="location.href='games.html'">🔙 خروج</button>
        <div class="logo">🎣 صيد الأرقام</div>
        <div class="star-badge" style="background: #fdcb6e; color: #d35400;">
            ⭐ <span id="stars-count">0</span>
        </div>
    </nav>

    <div class="container">
        <div class="target-panel">
            يا بطل، صِد الرقم: <span id="target-number">?</span>
            <button class="btn-universal" style="background: rgba(255,255,255,0.3); padding: 5px 15px;" onclick="speakTarget()">🔊 استمع</button>
        </div>

        <div class="game-area" id="game-area"></div>
    </div>

    <script>
        let targetNum;
        let score = 0;
        let gameInterval;
        let stars = JSON.parse(localStorage.getItem('gameProgress') || '{"stars": 0}').stars;

        // تحديث النجوم عند البداية
        document.getElementById('stars-count').innerText = stars;

        function initGame() {
            score = 0;
            newTarget();
            // بدء توليد الفقاعات كل ثانية ونص
            gameInterval = setInterval(createBubble, 1500);
        }

        // تحديد رقم هدف جديد
        function newTarget() {
            // أرقام عشوائية من 1 إلى 10 (يمكن زيادتها للمستويات المتقدمة)
            targetNum = Math.floor(Math.random() * 10) + 1;
            document.getElementById('target-number').innerText = targetNum;
            speakTarget(); // نطق الرقم تلقائياً
        }

        // نطق الرقم المستهدف
        function speakTarget() {
            const msg = new SpeechSynthesisUtterance("صِد الرقم " + targetNum);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        // إنشاء فقاعة عشوائية
        function createBubble() {
            const area = document.getElementById('game-area');
            const bubble = document.createElement('div');
            
            // تحديد محتوى الفقاعة (رقم عشوائي، قد يكون هو الهدف أو لا)
            const bubbleNum = Math.floor(Math.random() * 10) + 1;
            bubble.className = 'bubble';
            bubble.innerText = bubbleNum;

            // تحديد الموقع الأفقي عشوائياً
            const randomX = Math.random() * (window.innerWidth - 120);
            bubble.style.left = randomX + 'px';

            // إضافة الحركة للأعلى بمدة عشوائية (لزيادة التحدي)
            const duration = Math.random() * 3 + 4; // بين 4 إلى 7 ثواني
            bubble.style.animation = `floatUp ${duration}s linear forwards`;

            // التعامل مع الضغط على الفقاعة
            bubble.onclick = () => {
                if (bubbleNum === targetNum) {
                    // إجابة صحيحة
                    score++;
                    stars += 2; // نجمتين لكل صيد صحيح
                    saveProgress();
                    
                    bubble.classList.add('popped'); // تأثير الفرقعة
                    speakCorrect();
                    
                    // إزالة الفقاعة بعد الأنميشن
                    setTimeout(() => bubble.remove(), 300);
                    
                    newTarget(); // طلب رقم جديد
                } else {
                    // إجابة خاطئة
                    speakWrong();
                    // تأثير اهتزاز بسيط للدلالة على الخطأ
                    bubble.style.borderColor = '#ff7675';
                    setTimeout(() => bubble.style.borderColor = 'rgba(255,255,255,0.5)', 300);
                }
            };

            // إزالة الفقاعة إذا وصلت للأعلى دون ضغطها
            bubble.addEventListener('animationend', () => {
                bubble.remove();
            });

            area.appendChild(bubble);
        }

        function speakCorrect() {
            const msg = new SpeechSynthesisUtterance("أحسنت! بطل");
            msg.lang = 'ar-SA';
            msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function speakWrong() {
            const msg = new SpeechSynthesisUtterance("حاول مرة أخرى");
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        function saveProgress() {
            document.getElementById('stars-count').innerText = stars;
            localStorage.setItem('gameProgress', JSON.stringify({stars: stars}));
        }

        // بدء اللعبة عند التحميل
        window.onload = initGame;
    </script>
</body>
</html>
